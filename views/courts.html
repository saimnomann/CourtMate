<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Court Management</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<nav class="navbar navbar-dark">
  <div class="container">

    <a href="/dashboard" class="navbar-brand fw-bold">
      CourtMate Admin
    </a>

    <div>
      <a href="/dashboard" class="btn btn-outline-light btn-sm me-2">
        Dashboard
      </a>

      <button id="logoutBtn" class="btn btn-danger btn-sm">
        Logout
      </button>
    </div>

  </div>
</nav>
<div class="container py-5">

  <div class="row">

    <div class="col-lg-4">

      <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">

          <h4 class="mb-4">Add Court</h4>

          <form id="courtForm">

            <div class="mb-3">
              <label class="form-label">Court Name</label>

              <input
                type="text"
                id="courtName"
                class="form-control"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Court Type</label>

              <select id="courtType" class="form-select" required>
                <option value="Tennis">Tennis</option>
                <option value="Cricket">Cricket</option>
                <option value="Padel">Padel</option>
                <option value="Football">Football</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Location</label>

              <input
                type="text"
                id="location"
                class="form-control"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Hourly Rate</label>

              <input
                type="number"
                id="hourlyRate"
                class="form-control"
                min="1"
                step="1"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Status</label>

              <select id="status" class="form-select">
                <option value="Available">Available</option>
                <option value="Maintenance">Maintenance</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>

            <button class="btn btn-primary w-100">
              Add Court
            </button>

          </form>

        </div>
      </div>

    </div>

    <div class="col-lg-8">

      <div class="card shadow-sm border-0">
        <div class="card-body">

          <h4 class="mb-4">All Courts</h4>

          <div id="courtsContainer" class="row"></div>

        </div>
      </div>

    </div>

  </div>

</div>

<script src="/js/courts.js"></script>
<script src="/js/auth.js"></script>

</body>
</html>
