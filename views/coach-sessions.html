<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Coach Sessions | CourtMate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>

<nav class="navbar navbar-dark">
  <div class="container">

    <a href="/dashboard" class="navbar-brand fw-bold">
      CourtMate Coach
    </a>

    <div>
      <a href="/dashboard" class="btn btn-outline-light btn-sm me-2">
        Dashboard
      </a>

      <button id="logoutBtn" class="btn btn-danger btn-sm">
        Logout
      </button>
    </div>

  </div>
</nav>

<div class="container py-5">

  <div class="booking-hero mb-4">
    <span class="section-badge">Coach Panel</span>

    <h2 class="fw-bold mt-2 mb-1">
      Training Sessions
    </h2>

    <p class="text-muted mb-0">
      Create and manage athlete training sessions.
    </p>
  </div>

  <div class="row g-4">

    <div class="col-lg-5">

      <div class="card booking-panel">
        <div class="card-body p-4">

          <div class="d-flex justify-content-between align-items-center mb-4">

            <div>
              <h5 class="fw-bold mb-1">
                Create Session
              </h5>

              <p class="text-muted small mb-0">
                Add a new training session
              </p>
            </div>

            <span class="booking-icon">🏆</span>

          </div>

          <div id="sessionMessage"></div>

          <form id="sessionForm">

            <div class="mb-3">
              <label class="form-label">Session Title</label>

              <input
                type="text"
                id="title"
                class="form-control"
                placeholder="Example: Tennis Beginner Training"
                required
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Description</label>

              <textarea
                id="description"
                class="form-control"
                rows="3"
                placeholder="Describe the training session"
              ></textarea>
            </div>

            <div class="mb-3">
              <label class="form-label">Select Court</label>

              <select id="courtId" class="form-select" required>
                <option value="">Loading courts...</option>
              </select>
            </div>

            <div class="row">

              <div class="col-md-6 mb-3">
                <label class="form-label">Session Date</label>

                <input
                  type="date"
                  id="sessionDate"
                  class="form-control"
                  required
                />
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Start Time</label>

                <input
                  type="time"
                  id="startTime"
                  class="form-control"
                  required
                />
              </div>

            </div>

            <div class="row">

              <div class="col-md-6 mb-3">
                <label class="form-label">Duration Hours</label>

                <input
                  type="number"
                  id="durationHours"
                  class="form-control"
                  min="1"
                  step="1"
                  required
                />
              </div>

              <div class="col-md-6 mb-4">
                <label class="form-label">Max Athletes</label>

                <input
                  type="number"
                  id="maxAthletes"
                  class="form-control"
                  min="1"
                  step="1"
                  required
                />
              </div>

            </div>

            <button type="submit" class="btn btn-primary w-100">
              Create Session
            </button>

          </form>

        </div>
      </div>

    </div>

    <div class="col-lg-7">

      <div class="card booking-panel">
        <div class="card-body p-4">

          <div class="d-flex justify-content-between align-items-center mb-4">

            <div>
              <h5 class="fw-bold mb-1">
                My Sessions
              </h5>

              <p class="text-muted small mb-0">
                Sessions created by you
              </p>
            </div>

            <span class="badge bg-primary rounded-pill px-3 py-2">
              Coach
            </span>

          </div>

          <div id="sessionsContainer"></div>

        </div>
      </div>

    </div>

  </div>

</div>

<script src="/js/coachSessions.js"></script>
<script src="/js/auth.js"></script>

</body>
</html>
