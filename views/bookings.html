<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CourtMate Bookings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>

<nav class="navbar navbar-dark">
  <div class="container">
    <a href="/dashboard" class="navbar-brand fw-bold">
      CourtMate
    </a>

    <div>
      <a href="/dashboard" class="btn btn-outline-light btn-sm me-2">
        Dashboard
      </a>

      <button id="logoutBtn" class="btn btn-danger btn-sm">
        Logout
      </button>
    </div>
  </div>
</nav>

<div class="container py-5">

  <div class="booking-hero mb-4">
    <div>
      <span class="section-badge">Athlete Booking</span>
      <h2 class="fw-bold mt-2 mb-1">Book a Court</h2>
      <p class="text-muted mb-0">
        Choose your date and duration to see only available courts and time slots.
      </p>
    </div>
  </div>

  <div class="row g-4">

    <div class="col-lg-5">
      <div class="card booking-panel">
        <div class="card-body p-4">

          <div class="d-flex align-items-center justify-content-between mb-4">
            <div>
              <h5 class="fw-bold mb-1">Booking Details</h5>
              <p class="text-muted small mb-0">Check available slots first</p>
            </div>
    
          </div>

          <form id="bookingForm">

            <div class="mb-3">
              <label class="form-label">Booking Date</label>
              <input type="date" id="bookingDate" class="form-control" required />
            </div>

            <div class="mb-3">
              <label class="form-label">Duration Hours</label>
              <input
                type="number"
                id="durationHours"
                class="form-control"
                min="1"
                step="1"
                placeholder="Example: 1"
                required
              />
            </div>

            <button type="button" id="checkSlotsBtn" class="btn btn-dark w-100 mb-3">
              Check Available Slots
            </button>

            <div id="slotMessage" class="mb-3"></div>

            <div class="mb-3">
              <label class="form-label">Available Court</label>
              <select id="courtId" class="form-select" required>
                <option value="">Check slots first</option>
              </select>
            </div>

            <div class="mb-4">
              <label class="form-label">Available Time</label>
              <select id="startTime" class="form-select" required>
                <option value="">Check slots first</option>
              </select>
            </div>

            <button type="submit" class="btn btn-primary w-100">
              Confirm Booking
            </button>

          </form>

        </div>
      </div>
    </div>

    <div class="col-lg-7">
      <div class="card booking-panel">
        <div class="card-body p-4">

          <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
              <h5 class="fw-bold mb-1">My Bookings</h5>
              <p class="text-muted small mb-0">Your upcoming and previous bookings</p>
            </div>

            <span class="badge rounded-pill bg-primary px-3 py-2">
              Athlete
            </span>
          </div>

          <div id="bookingsContainer" class="booking-list"></div>

        </div>
      </div>
    </div>

  </div>

</div>

<script src="/js/booking.js"></script>
<script src="/js/auth.js"></script>

</body>
</html>
