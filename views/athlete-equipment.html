<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Equipment Rental | CourtMate</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>

<nav class="navbar navbar-dark">
  <div class="container">
    <a href="/dashboard" class="navbar-brand fw-bold">CourtMate Athlete</a>

    <div>
      <a href="/dashboard" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
      <button id="logoutBtn" class="btn btn-danger btn-sm">Logout</button>
    </div>
  </div>
</nav>

<div class="container py-5">

  <div class="booking-hero mb-4">
    <span class="section-badge">Athlete Panel</span>
    <h2 class="fw-bold mt-2 mb-1">Equipment Rental</h2>
    <p class="text-muted mb-0">Rent available equipment and manage your active rentals.</p>
  </div>

  <div class="row g-4">

    <div class="col-lg-5">
      <div class="card booking-panel">
        <div class="card-body p-4">
          <h5 class="fw-bold mb-3">Rent Equipment</h5>

          <div id="rentalMessage"></div>

          <form id="rentalForm">
            <div class="mb-3">
              <label class="form-label">Equipment</label>
              <select id="equipmentId" class="form-select" required>
                <option value="">Loading equipment...</option>
              </select>
            </div>

            <div class="mb-3">
              <label class="form-label">Quantity</label>
              <input type="number" id="quantity" class="form-control" min="1" required />
            </div>

            <div class="mb-3">
              <label class="form-label">Rental Date</label>
              <input type="date" id="rentalDate" class="form-control" required />
            </div>

            <button class="btn btn-primary w-100" type="submit">
              Rent Equipment
            </button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-lg-7">
      <div class="card booking-panel">
        <div class="card-body p-4">
          <h5 class="fw-bold mb-3">My Rentals</h5>
          <div id="rentalsContainer"></div>
        </div>
      </div>
    </div>

  </div>

</div>

<script src="/js/athleteEquipment.js"></script>
<script src="/js/auth.js"></script>

</body>
</html>
